name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build console
        run: cd apps/console && npm ci && npx vite build

      # --- Agent worker: upload new version (not live yet) ---
      - name: Upload agent worker version
        id: agent_upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          npx wrangler versions upload --config wrangler.jsonc 2>&1 | tee /tmp/agent-upload.log
          VERSION_ID=$(grep -oP 'Worker Version ID: \K[^\s]+' /tmp/agent-upload.log || true)
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "Agent version: $VERSION_ID"

      # --- Main worker: upload new version (not live yet) ---
      - name: Upload main worker version
        id: main_upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          npx wrangler versions upload --config wrangler.jsonc 2>&1 | tee /tmp/main-upload.log
          VERSION_ID=$(grep -oP 'Worker Version ID: \K[^\s]+' /tmp/main-upload.log || true)
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "Main version: $VERSION_ID"

      # --- Smoke test: verify new versions via version override ---
      - name: Smoke test
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # Test main worker health
          HEALTH=$(curl -sf "${{ vars.MAIN_WORKER_URL }}/health")
          echo "Health: $HEALTH"

          # TODO: add version override header tests when version IDs are available
          echo "Smoke test passed"

      # --- Deploy: agent worker first (dependency), then main worker ---
      - name: Deploy agent worker → 100%
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VID="${{ steps.agent_upload.outputs.version_id }}"
          if [ -z "$VID" ]; then
            echo "No version ID captured, falling back to wrangler deploy"
            cd apps/agent && npx wrangler deploy --config wrangler.jsonc
          else
            cd apps/agent
            for i in 1 2 3; do
              npx wrangler versions deploy "${VID}@100%" --config wrangler.jsonc --yes && break
              echo "Attempt $i failed, waiting 30s before retry..."
              sleep 30
            done
          fi

      - name: Deploy main worker → 100%
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VID="${{ steps.main_upload.outputs.version_id }}"
          if [ -z "$VID" ]; then
            echo "No version ID captured, falling back to wrangler deploy"
            cd apps/main && npx wrangler deploy --config wrangler.jsonc
          else
            cd apps/main
            for i in 1 2 3; do
              npx wrangler versions deploy "${VID}@100%" --config wrangler.jsonc --yes && break
              echo "Attempt $i failed, waiting 30s before retry..."
              sleep 30
            done
          fi

      # --- Post-deploy verification ---
      - name: Verify deployment
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          sleep 5
          HEALTH=$(curl -sf "${{ vars.MAIN_WORKER_URL }}/health")
          echo "Post-deploy health: $HEALTH"
