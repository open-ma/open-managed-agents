name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build console
        run: pnpm --filter managed-agents-console build

      # --- Deploy both workers with retry ---
      - name: Deploy agent worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Agent worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      - name: Deploy main worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          cd apps/main
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Main worker deployed successfully"
              break
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
            if [ "$i" = "3" ]; then echo "All attempts failed"; exit 1; fi
          done

          # Attach custom domain if configured (idempotent — skips if already set)
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "Configuring custom domain: $CUSTOM_DOMAIN"
            npx wrangler domains attach "$CUSTOM_DOMAIN" --service managed-agents || echo "Custom domain may already be attached"
          fi

      # --- Post-deploy verification ---
      - name: Verify deployment
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          sleep 5
          # Use custom domain if set, fall back to workers.dev
          BASE_URL="${CUSTOM_DOMAIN:+https://$CUSTOM_DOMAIN}"
          BASE_URL="${BASE_URL:-${{ vars.MAIN_WORKER_URL }}}"
          echo "Checking health at: $BASE_URL/health"
          HEALTH=$(curl -sf "$BASE_URL/health" || curl -sf "${{ vars.MAIN_WORKER_URL }}/health")
          echo "Post-deploy health: $HEALTH"
