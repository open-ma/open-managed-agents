name: Bootstrap Staging R2 Secrets (one-shot)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Set R2 secrets on sandbox-default-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 44af79e51582ca20c9003eb926540242
        run: |
          set -e
          W=sandbox-default-staging
          echo "${{ secrets.R2_ENDPOINT }}"          | npx wrangler secret put R2_ENDPOINT          --name "$W"
          echo "${{ secrets.R2_ACCESS_KEY_ID }}"     | npx wrangler secret put R2_ACCESS_KEY_ID     --name "$W"
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY --name "$W"
          echo "44af79e51582ca20c9003eb926540242"     | npx wrangler secret put R2_ACCOUNT_ID        --name "$W"
          echo "Done."
