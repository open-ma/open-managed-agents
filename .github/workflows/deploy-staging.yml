name: Deploy Staging

on:
  workflow_dispatch:
  # Manual-only by design — staging is for pre-merge validation, not
  # auto-bound to any branch. Trigger from the Actions tab when you want
  # to push the current branch's code to staging.

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Build console (assets bundled into main worker)
        run: pnpm --filter managed-agents-console build

      # Deploy main worker to staging — `--env staging` activates the
      # `env.staging` block in apps/main/wrangler.jsonc (separate name,
      # KV, D1, R2 buckets per the file).
      - name: Deploy main worker (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          for i in 1 2 3; do
            if npx wrangler deploy --env staging; then exit 0; fi
            echo "Attempt $i/3 failed, waiting 60s..."; sleep 60
          done
          exit 1

      - name: Deploy agent worker (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          for i in 1 2 3; do
            if npx wrangler deploy --env staging; then exit 0; fi
            echo "Attempt $i/3 failed, waiting 60s..."; sleep 60
          done
          exit 1

      - name: Deploy integrations worker (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/integrations
          if [ -d . ]; then
            for i in 1 2 3; do
              if npx wrangler deploy --env staging 2>/dev/null; then exit 0; fi
              echo "Attempt $i/3 failed, waiting 60s..."; sleep 60
            done
          fi

      # --- Secret sync (same drift-prevention pattern as deploy.yml) ---
      #
      # Without this, every staging deploy that recreates a worker drops
      # any manually-set secrets (wrangler bindings list is the static
      # set in wrangler.jsonc). Sourcing from GH secrets makes drift
      # impossible.

      - name: Sync INTEGRATIONS_INTERNAL_SECRET to staging workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          INTEGRATIONS_INTERNAL_SECRET: ${{ secrets.INTEGRATIONS_INTERNAL_SECRET }}
        if: ${{ env.INTEGRATIONS_INTERNAL_SECRET != '' }}
        run: |
          set -e
          for entry in "apps/main:managed-agents-staging" "apps/integrations:managed-agents-integrations-staging"; do
            dir="${entry%%:*}"; worker="${entry##*:}"
            (cd "$dir" && echo "$INTEGRATIONS_INTERNAL_SECRET" | npx wrangler secret put INTEGRATIONS_INTERNAL_SECRET --name "$worker" >/dev/null) || true
            echo "  ✓ $worker"
          done

      - name: Sync R2 secrets to sandbox-default-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        if: ${{ env.R2_ENDPOINT != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' }}
        run: |
          set -e
          cd apps/agent
          W=sandbox-default-staging
          echo "$R2_ENDPOINT"           | npx wrangler secret put R2_ENDPOINT          --name "$W" >/dev/null
          echo "$R2_ACCESS_KEY_ID"      | npx wrangler secret put R2_ACCESS_KEY_ID     --name "$W" >/dev/null
          echo "$R2_SECRET_ACCESS_KEY"  | npx wrangler secret put R2_SECRET_ACCESS_KEY --name "$W" >/dev/null
          echo "$CLOUDFLARE_ACCOUNT_ID" | npx wrangler secret put R2_ACCOUNT_ID        --name "$W" >/dev/null
          echo "✓ R2_* synced to $W"

      - name: Sync ANTHROPIC_API_KEY to staging agent worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          set -e
          cd apps/agent
          echo "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY --name sandbox-default-staging >/dev/null
          echo "✓ ANTHROPIC_API_KEY synced"
