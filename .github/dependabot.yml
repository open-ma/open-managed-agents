version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      types:
        patterns:
          - "@types/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
